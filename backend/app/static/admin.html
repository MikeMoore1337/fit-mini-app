<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>Админка - FitMiniApp</title>
  <link rel="stylesheet" href="/static/styles.css?v=19" />
</head>
<body>
  <div class="container narrow">
    <div class="card hero-card">
      <div>
        <h1>Панель администратора</h1>
        <p class="muted">Просмотр пользователей, платежей, уведомлений и шаблонов программ.</p>
      </div>
      <a href="/app" class="button-link">К Mini App</a>
    </div>

    <div class="card">
      <div class="section-head">
        <h2>Пользователи</h2>
        <button id="loadUsersBtn" class="secondary">Загрузить</button>
      </div>
      <div id="usersList" class="stack"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h2>Платежи</h2>
        <button id="loadPaymentsBtn" class="secondary">Загрузить</button>
      </div>
      <div id="paymentsList" class="stack"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h2>Уведомления</h2>
        <button id="loadNotificationsBtn" class="secondary">Загрузить</button>
      </div>
      <div id="adminNotificationsList" class="stack"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h2>Шаблоны программ</h2>
        <button id="loadTemplatesBtn" class="secondary">Загрузить</button>
      </div>
      <div id="adminTemplatesList" class="stack"></div>
    </div>

    <div class="card">
      <h2>Лог</h2>
      <pre id="adminLog" class="log-box"></pre>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
    const accessTokenKey = 'fit_access_token';

    const $ = (id) => document.getElementById(id);

    function log(msg) {
      const node = $('adminLog');
      if (!node) return;
      const text = typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2);
      node.textContent = `${new Date().toLocaleTimeString()} - ${text}\n${node.textContent}`;
    }

    function showToast(message, type = 'success') {
      const toast = $('toast');
      if (!toast) return;

      toast.textContent = message;
      toast.className = `toast ${type === 'error' ? 'error' : ''}`.trim();

      setTimeout(() => {
        toast.className = 'toast hidden';
      }, 2500);
    }

    function escapeHtml(value) {
      const text = value == null ? '' : String(value);
      const replacements = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      };
      return text.replace(/[&<>"']/g, (char) => replacements[char]);
    }

    function authHeaders() {
      const token = localStorage.getItem(accessTokenKey);
      return {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
      };
    }

    async function api(path) {
      const res = await fetch(path, { headers: authHeaders() });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text);
      }
      return res.json();
    }

    async function loadUsers() {
      const rows = await api('/api/v1/admin/users');
      $('usersList').innerHTML = rows.map(user => `
        <div class="item-card">
          <strong>${escapeHtml(user.full_name || user.telegram_user_id)}</strong><br>
          <span class="muted">
            ID: ${escapeHtml(user.telegram_user_id)} |
            coach=${escapeHtml(user.is_coach)} |
            admin=${escapeHtml(user.is_admin)}
          </span>
        </div>
      `).join('') || '<p class="muted">Пользователей нет</p>';
      showToast('Пользователи загружены');
    }

    async function loadPayments() {
      const rows = await api('/api/v1/admin/payments');
      $('paymentsList').innerHTML = rows.map(row => `
        <div class="item-card">
          <strong>${escapeHtml(row.plan_title || row.plan_code)}</strong><br>
          <span class="muted">
            Пользователь: ${escapeHtml(row.telegram_user_id)} |
            Статус: ${escapeHtml(row.status)} |
            ${escapeHtml(row.amount)} ${escapeHtml(row.currency)}
          </span>
        </div>
      `).join('') || '<p class="muted">Платежей нет</p>';
      showToast('Платежи загружены');
    }

    async function loadNotifications() {
      const rows = await api('/api/v1/admin/notifications');
      $('adminNotificationsList').innerHTML = rows.map(row => `
        <div class="item-card">
          <strong>${escapeHtml(row.title)}</strong><br>
          <span class="muted">${escapeHtml(new Date(row.scheduled_for).toLocaleString())} - ${escapeHtml(row.status)}</span>
          <div>${escapeHtml(row.body)}</div>
        </div>
      `).join('') || '<p class="muted">Уведомлений нет</p>';
      showToast('Уведомления загружены');
    }

    async function loadTemplates() {
      const rows = await api('/api/v1/admin/templates');
      $('adminTemplatesList').innerHTML = rows.map(row => `
        <div class="item-card">
          <strong>${escapeHtml(row.title)}</strong><br>
          <span class="muted">${escapeHtml(row.goal)} - ${escapeHtml(row.level)}</span>
        </div>
      `).join('') || '<p class="muted">Шаблонов нет</p>';
      showToast('Шаблоны загружены');
    }

    async function withLoading(button, action, successText, errorText) {
      const original = button.textContent;
      try {
        button.disabled = true;
        button.textContent = 'Загрузка...';
        await action();
        if (successText) showToast(successText);
      } catch (error) {
        log(String(error));
        showToast(errorText || 'Ошибка', 'error');
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }

    $('loadUsersBtn').onclick = (e) =>
      withLoading(e.currentTarget, loadUsers, null, 'Не удалось загрузить пользователей');

    $('loadPaymentsBtn').onclick = (e) =>
      withLoading(e.currentTarget, loadPayments, null, 'Не удалось загрузить платежи');

    $('loadNotificationsBtn').onclick = (e) =>
      withLoading(e.currentTarget, loadNotifications, null, 'Не удалось загрузить уведомления');

    $('loadTemplatesBtn').onclick = (e) =>
      withLoading(e.currentTarget, loadTemplates, null, 'Не удалось загрузить шаблоны');
  </script>
</body>
</html>
