services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitminiapp
      POSTGRES_USER: fitminiapp
      POSTGRES_PASSWORD: fitminiapp777!!!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitminiapp -d fitminiapp"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app

  bot:
    build: ./bot
    env_file: .env
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./bot:/app

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
    command: /app/worker-entrypoint.sh
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
