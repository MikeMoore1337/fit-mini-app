# Запуск: pip install pre-commit && pre-commit install
# Все файлы: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^(backend/app|tests)/
      - id: ruff-format
        files: ^(backend/app|tests)/

  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (backend app)
        entry: python scripts/run_mypy.py
        language: system
        pass_filenames: false
        files: ^(backend/app|scripts/run_mypy\.py|pyproject\.toml)
